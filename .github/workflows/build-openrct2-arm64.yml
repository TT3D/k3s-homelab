name: Build OpenRCT2 ARM64

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-openrct2-arm64.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tt3d/openrct2-cli
  OPENRCT2_VERSION: "0.5.3"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out homelab repository
        uses: actions/checkout@v4

      - name: Check out official OpenRCT2 Docker repository
        uses: actions/checkout@v4
        with:
          repository: OpenRCT2/openrct2-docker
          ref: master
          path: openrct2-docker

      - name: Configure ARM emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish ARM64 image
        uses: docker/build-push-action@v6
        with:
          context: ./openrct2-docker/${{ env.OPENRCT2_VERSION }}/cli
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.OPENRCT2_VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
